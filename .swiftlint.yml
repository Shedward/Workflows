excluded:
  - .build
  - .claude
  - Tools

opt_in_rules:
  - array_init
  - async_without_await
  - closure_body_length
  - closure_end_indentation
  - collection_alignment
  - comma_inheritance
  - conditional_returns_on_newline
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - convenience_type
  - direct_return
  - discouraged_assert
  - duplicate_conditions
  - duplicated_key_in_dictionary_literal
  - empty_string
  - explicit_init
  - fatal_error_message
  - first_where
  - flatmap_over_map_reduce
  - for_where
  - identical_operands
  - implicit_optional_initialization
  - is_disjoint
  - joined_default_parameter
  - large_tuple
  - last_where
  - legacy_multiple
  - legacy_random
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_parameters
  - multiple_closures_with_trailing_closure
  - no_space_in_method_call
  - number_separator
  - operator_usage_whitespace
  - pattern_matching_keywords
  - period_spacing
  - prefer_condition_list
  - prefer_key_path
  - prefer_type_checking
  - reduce_boolean
  - redundant_nil_coalescing
  - redundant_self
  - redundant_string_enum_value
  - redundant_type_annotation
  - self_binding
  - self_in_property_initialization
  - shorthand_optional_binding
  - sorted_first_last
  - sorted_imports
  - static_operator
  - static_over_final_class
  - toggle_bool
  - trailing_closure
  - type_contents_order
  - unavailable_condition
  - unneeded_parentheses_in_closure_argument
  - unneeded_throws_rethrows
  - unused_closure_parameter
  - unused_enumerated
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - void_return
  - weak_delegate
  - yoda_condition

disabled_rules:
  - shorthand_argument

# Rule configuration

closure_body_length:
  warning: 30
  error: 100

collection_alignment:
  align_colons: false

colon:
  flexible_right_spacing: true
  apply_to_dictionaries: true

conditional_returns_on_newline:
  if_only: false

cyclomatic_complexity:
  warning: 10
  error: 40
  ignores_case_statements: true

file_length:
  warning: 320
  error: 1600
  ignore_comment_only_lines: true

force_try:
  severity: warning

function_body_length:
  warning: 50
  error: 100

function_parameter_count:
  warning: 5
  error: 20

generic_type_name:
  min_length:
    warning: 3
    error: 0
  max_length:
    warning: 20
    error: 80
  excluded:
    - T
    - U
    - V
    - P
    - K
    - A

identifier_name:
  min_length:
    warning: 3
    error: 0
  max_length:
    warning: 50
    error: 160
  allowed_symbols: ["_"]
  excluded:
    - i
    - j
    - x
    - y
    - z
    - id
    - to
    - ok
    - on
    - up

large_tuple:
  warning: 5
  error: 20

line_length:
  warning: 150
  error: 200

modifier_order:
  preferred_modifier_order:
    - acl
    - setterACL
    - override
    - owned
    - mutators
    - final
    - typeMethods
    - required
    - convenience
    - lazy
    - dynamic

nesting:
  type_level:
    warning: 4
    error: 16
  function_level:
    warning: 5
    error: 20

number_separator:
  minimum_length: 5
  minimum_fraction_length: 5

operator_usage_whitespace:
  skip_aligned_constants: false

shorthand_operator:
  severity: warning

statement_position:
  statement_mode: default

switch_case_alignment:
  indented_cases: false

trailing_closure:
  only_single_muted_parameter: true

trailing_comma:
  mandatory_comma: false

trailing_whitespace:
  ignores_empty_lines: false
  ignores_comments: false

type_body_length:
  warning: 250
  error: 350

type_contents_order:
  order:
    - associated_type
    - type_alias
    - subtype
    - case
    - type_property
    - type_method
    - instance_property
    - initializer
    - deinitializer
    - other_method
    - subscript

type_name:
  min_length:
    warning: 3
    error: 0
  max_length:
    warning: 50
    error: 200

unused_optional_binding:
  ignore_optional_try: false

vertical_whitespace:
  max_empty_lines: 1

custom_rules:
  single_line_function:
    name: Single Line Function
    message: Do not use single line methods
    regex: func[ ]+\w*\([^\{\n]*\)[^\{\n]*\{[ ]*\w+
    severity: warning
  multiline_condition:
    name: Multiline Condition
    message: Replace first condition into new line
    regex: ^[ ]*(guard|while)[^\n]*(,|&&|\|\|)$
    severity: warning
